<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For MyLovee</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('eaea.jpeg') no-repeat center/cover;
  overflow:hidden;
}

.overlay {
  background: rgba(0,0,0,0.6);
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

.box {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:100%;
  max-width:320px;
  animation: fadeIn 1.2s ease;
}

h2 { font-size:22px; }
p { font-size:15px; margin-top:10px; }

input {
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  margin-top:10px;
}

button {
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff6b81;
  cursor:pointer;
  width:100%;
}

.hidden {
  display:none;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* LOVE */
.heart {
  position:absolute;
  color:white;
  font-size:20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(100vh); opacity:1;}
  100% {transform: translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="login">
  <div class="box">
    <h2>Kode rahasia dulu 💌</h2>
    <input type="password" id="pass" placeholder="kata spesial kita">
    <button onclick="cek(this)">Buka</button>
  </div>
</div>

<!-- MAIN -->
<div class="overlay hidden" id="main">
  <div class="box">
    <h2>...</h2>
    <p>
      meeting u was like my best part of life,  
      its too much if i explain how perfect u're,
      <br><br>
      u have kind heart like an angel 
      and i hope i will love u till the world stops turning.
    </p>
  </div>
</div>

<!-- AUDIO -->
<audio id="music" loop preload="auto">
  <source src="musikk.mp3" type="audio/mpeg">
</audio>

<script>

let password = "231223";

function cek(btn){
  let input = document.getElementById("pass").value;
  let music = document.getElementById("music");

  if(input === password){

    // 🔥 INI KUNCI: play langsung dari klik
    music.currentTime = 30;
    music.play();

    // tampilkan halaman
    document.getElementById("login").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");

    startHearts();

  } else {
    alert("Salah 😝 coba lagi");
  }
}

/* LOVE */
function startHearts(){
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{ heart.remove(); },5000);
  },300);
}

</script>

</body>
</html>
