<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For MyLovee</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('eaea.jpeg') no-repeat center/cover;
  overflow:hidden;
}

.overlay {
  background: rgba(0,0,0,0.6);
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:90%;
  max-width:320px;
}

input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background:white;
  color:#ff6b81;
  cursor:pointer;
}

.hidden { display:none; }

/* LOVE */
.heart {
  position:absolute;
  color:white;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="overlay" id="login">
  <div class="box">
    <h2>Kode rahasia dulu 💌</h2>
    <input type="password" id="pass">
    <button onclick="cek()">Buka</button>
  </div>
</div>

<div class="overlay hidden" id="main">
  <div class="box">
    <h2>...</h2>
    <p>
      meeting u was like my best part of life,  
      its too much if i explain how perfect u're,
      <br><br>
      u have kind heart like an angel 
      and i hope i will love u till the world stops turning.
    </p>
  </div>
</div>

<audio id="music" loop>
  <source src="party.mp3" type="audio/mpeg">
</audio>

<script>
let password = "231223";
let music = document.getElementById("music");

// 🔥 STEP 1: UNLOCK AUDIO (WAJIB UNTUK HP)
document.addEventListener("click", function unlockAudio(){
  music.play().then(()=>{
    music.pause();
    music.currentTime = 0;
    document.removeEventListener("click", unlockAudio);
  }).catch(()=>{});
});

// 🔥 STEP 2: FUNCTION LOGIN
function cek(){
  let input = document.getElementById("pass").value;

  if(input === password){

    // tunggu audio siap dulu
    music.addEventListener("loadeddata", function(){
      music.currentTime = 137;
      music.play();
    }, { once: true });

    // kalau sudah ready langsung play juga
    if(music.readyState >= 2){
      music.currentTime = 137;
      music.play().catch(()=>{
        alert("Tap sekali lagi ya biar lagunya jalan 😳");
      });
    }

    document.getElementById("login").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");

    startHearts();

  } else {
    alert("Salah 😝");
  }
}

// 💖 LOVE
function startHearts(){
  setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left = Math.random()*100+"%";
    heart.style.fontSize = (Math.random()*20+10)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
  },300);
}
</script>

</body>
</html>
